<!DOCTYPE html>
<html>
  <head>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
	<script>
	$(document).ready(function(){
		$("div a:last").remove();
	});
	</script>
    <title>Block Terminal</title>
    <link rel="stylesheet" href="terminal.css">
    <style>
      body {
        background: black;
        color:      #1ec503;
        
        width:  100%;
        height: 100%;
        
        padding: 0;
        margin:  0;
        
        box-sizing: border-box;        
      }
    </style>
  </head>
  <body>
    <h1 id="header">D86592 Terminal</h1>
    <div id="terminal">
      <p>Type 'help' to get started.</p>
      <p class="hidden">
        <span class="prompt">guest@D86592 | <span id="timestamp"></span> | > </span>
        <span contenteditable="true" class="input"> </span>
      </p>
	<script>$("p:last-of-type #timestamp").html(new Date().toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit'}))</script>
    </div>
    <script src="terminal.js"></script>
    <script>
    
    
      var commands = {};
      
      commands.help = function() {
        var output = "<div>" +
                     "<ul>" +
                     "<li><strong>help</strong> - Display this help.</li>" +
                     "<li><strong>youtube [yt]</strong> - Visit Theblockbuster'1 YouTube channel</li>" +
                     "<li><strong>tempoinvite</strong> - Invite to our music bot, Tempo</li>" +
                     "<li><strong>curseforge</strong> - View Curseforge Direct Downloader</li>" +
                     "<li><strong>meow</strong> - uhhhh</li>" +
                     "</ul></div>";
        return output;
      };
      commands.tempoinvite = function(args) {
        window.open('https://discordapp.com/api/oauth2/authorize?client_id=682353731055910935&permissions=37091648&scope=bot', '_blank');
        window.open('https://github.com/jagrosh/MusicBot/blob/master/LICENSE', '_blank');
	   return "Bot invite opened in a new tab. Please read the license from the bot i used to make Tempo, Jagrosh's JMusic bot (Copyright 2020 John Grosh)  which is also opened.";
      };
      commands.curseforge = function(args) {
        window.open('https://greasyfork.org/en/scripts/394179-curseforge-direct-downloader', '_blank');
		return "Curseforge Direct Downloader opened in a new tab.";
      };
      commands.youtube = function(args) {
        window.open('https://www.youtube.com/channel/UCxAA6H14YiH8pqUEb9JZ1vA', '_blank');
		return "YouTube channel opened in a new tab.";
      };
      commands.yt = function(args) {
        window.open('https://www.youtube.com/channel/UCxAA6H14YiH8pqUEb9JZ1vA', '_blank');
		return "YouTube channel opened in a new tab.";
      };
      commands.meow = function(args) {
        window.location.href = 'uhhhhmeow';
		return "gotta go fast";
      };
      commands.exit = function(args) {
        window.history.back();
		return "cya :)";
      };
      Terminal.init(document.getElementById("terminal"), commands);
    </script>
  </body>
</html>
